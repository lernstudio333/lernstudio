<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Lernstudio" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Lernstudio</title>
    <script>
      // GitHub Pages SPA: restore path from ?p= query param before React mounts
      (function() {
        var search = window.location.search;
        if (search.slice(1, 3) === 'p=') {
          var decoded = search.slice(3).replace(/~and~/g, '&');
          var qIndex = decoded.indexOf('&q=');
          var path = qIndex >= 0 ? decoded.slice(0, qIndex) : decoded;
          var query = qIndex >= 0 ? '?' + decoded.slice(qIndex + 3) : '';
          window.history.replaceState(null, null,
            window.location.pathname.split('/').slice(0, -1).join('/') + '/' + path + query + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
