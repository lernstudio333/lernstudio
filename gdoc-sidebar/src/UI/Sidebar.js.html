<script>
  const el = (id) => document.getElementById(id);
  const otpInputs = document.querySelectorAll('.otp-input');

  // --- 1. OTP AUTO-FOCUS & PASTE (From your original) ---
  if (otpInputs.length > 0) {
    otpInputs[0].addEventListener('paste', (e) => {
      e.preventDefault();
      const data = e.clipboardData.getData('text').trim();
      if (!/^\d{6}$/.test(data)) return; 
      data.split('').forEach((char, i) => { if (otpInputs[i]) otpInputs[i].value = char; });
      otpInputs[5].focus();
    });

    otpInputs.forEach((input, index) => {
      input.addEventListener('input', () => {
        if (input.value && index < 5) otpInputs[index + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) otpInputs[index - 1].focus();
      });
    });
  }

  // --- 2. SURGICAL NAVIGATION ---
  function triggerNav(direction) {
    toggleLoading(true, "Searching...");
    google.script.run
      .withSuccessHandler((res) => {
        toggleLoading(false);
        if (res.success && res.card) {
          renderCardToInspector(res.card);
          syncUIFromMetadata(res.card);
        } else {
          showStatus(res.message || "No card found", "text-warning");
        }
      })
      .getSurgicalPreview(direction);
  }

  // --- 3. UPSERT ORCHESTRATOR ---
  function handleInsertMarker(event) {
    const btn = event.currentTarget;
    const cardType = document.querySelector('input[name="cardType"]:checked').value;
    const params = {
      cardType: cardType,
      noBackward: el('fNoBackwards').checked,
      noTyping: el('fNoTyping').checked
    };

    btn.disabled = true;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';

    google.script.run
      .withSuccessHandler((res) => {
        btn.disabled = false;
        btn.innerHTML = originalText;
        if (res.success) {
          showStatus(res.action === 'PREVIEW_ONLY' ? "Reviewing Card" : "Marker Created! ✨", "text-success");
          if (res.cardMetadata) syncUIFromMetadata(res.cardMetadata);
        } else {
          showStatus(res.error || "Something went wrong.", "text-danger");
        }
      })
      .withFailureHandler((err) => {
        btn.disabled = false;
        btn.innerHTML = originalText;
        showStatus(err.message || "Script error.", "text-danger");
      })
      .handleInsertMarkerOrchestrator(params);
  }

  // --- 4. HELPERS ---
  function syncUIFromMetadata(data) {
    // Works with both RawCard (id) and CardMetadata (id)
    const type = data.typeKey || data.type;
    const flags = data.flags || [];
    
    const radio = document.querySelector(`input[name="cardType"][value="${type}"]`);
    if (radio) radio.checked = true;
    el('fNoBackwards').checked = flags.includes("NO_BW");
    el('fNoTyping').checked = flags.includes("NO_TYPING");
  }

  function renderCardToInspector(card) {
    el('previewId').innerText = `#${card.cardId.toString().slice(-4)}`;
    el('previewType').innerText = card.type.replace('_', ' ');
    const context = card.parents.length > 0 ? `<span class="text-muted opacity-75">${card.parents.join(' › ')} › </span>` : '';
    el('previewQuestion').innerHTML = `${context}<br>${card.question}`;
    const list = el('previewAnswers');
    list.innerHTML = Array.isArray(card.answer)
      ? card.answer.map(c => `<li>${c}</li>`).join('')
      : (card.answer ? `<li>${card.answer}</li>` : '<li>No answer</li>');
  }

  function showStatus(msg, className) {
    const s = el('statusMessage');
    s.innerText = msg;
    s.className = `small fw-bold text-center mt-2 ${className}`;
    s.classList.remove('d-none');
    setTimeout(() => s.classList.add('d-none'), 3000);
  }

  function toggleLoading(show, text = "") {
    const s = el('statusMessage');
    s.innerText = text;
    s.className = "small text-muted text-center mt-2";
    show ? s.classList.remove('d-none') : s.classList.add('d-none');
  }

  // --- 5. TRANSFER TAB ---

  function initTransferTab() {
    google.script.run
      .withSuccessHandler((connection) => {
        if (connection && connection.sessionToken) {
          showConnectedState(connection);
        }
        // If null, the pairing UI is already visible by default — nothing to do.
      })
      .getConnectionStatus();
  }

  function showConnectedState(connection) {
    const parts = [connection.programName, connection.courseName, connection.lessonName]
      .filter(Boolean);
    const label = parts.length > 0 ? parts.join(' > ') : connection.lessonId;
    el('lessonBreadcrumb').innerText = label;
    el('pairingUi').classList.add('d-none');
    el('transferUi').classList.remove('d-none');
  }

  function handleConnect() {
    const code = Array.from(document.querySelectorAll('.otp-input'))
      .map((i) => i.value).join('');
    const lessonId = el('lessonId').value.trim();

    if (!/^\d{6}$/.test(code)) return showStatus("Please enter a 6-digit pairing code.", "text-danger");
    if (!lessonId)              return showStatus("Please enter a Lesson ID.", "text-danger");

    el('btnConnect').disabled = true;
    google.script.run
      .withSuccessHandler((res) => {
        el('btnConnect').disabled = false;
        if (res.success) {
          // Re-fetch connection to get the stored object for display
          google.script.run
            .withSuccessHandler(showConnectedState)
            .getConnectionStatus();
        } else {
          showStatus(res.message || "Connection failed.", "text-danger");
        }
      })
      .withFailureHandler((err) => {
        el('btnConnect').disabled = false;
        showStatus(err.message || "Script error.", "text-danger");
      })
      .runPairingWorkflow(code, lessonId);
  }

  function disconnect() {
    google.script.run
      .withSuccessHandler(() => {
        el('transferUi').classList.add('d-none');
        el('pairingUi').classList.remove('d-none');
        // Clear OTP inputs
        document.querySelectorAll('.otp-input').forEach((i) => i.value = '');
        el('lessonId').value = '';
      })
      .disconnectLesson();
  }

  function runTransfer() {
    const btn = el('btnCommit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Checking...';

    google.script.run
      .withSuccessHandler((res) => {
        btn.disabled = false;
        btn.innerHTML = 'Transfer Cards';
        if (!res.success) {
          showStatus(res.message || 'Transfer check failed.', 'text-danger');
          return;
        }
        if (res.analysis.nothingToDo) {
          showStatus('Already in sync — nothing to transfer.', 'text-success');
          return;
        }
        // Show dry-run report
        const lines = [];
        if (res.analysis.insertedCount > 0) lines.push(`<li>${res.analysis.insertedCount} card(s) to insert</li>`);
        if (res.analysis.updatedCount  > 0) lines.push(`<li>${res.analysis.updatedCount} card(s) to update</li>`);
        el('reportList').innerHTML = lines.join('');
        btn.classList.add('d-none');
        el('transferReport').classList.remove('d-none');
      })
      .withFailureHandler((err) => {
        btn.disabled = false;
        btn.innerHTML = 'Transfer Cards';
        showStatus(err.message || 'Script error.', 'text-danger');
      })
      .runTransferWorkflow(true);
  }

  function confirmTransfer() {
    const btn = el('btnConfirm');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Transferring...';

    google.script.run
      .withSuccessHandler((res) => {
        btn.disabled = false;
        btn.innerHTML = 'Confirm Transfer';
        el('transferReport').classList.add('d-none');
        el('btnCommit').classList.remove('d-none');
        if (res.success) {
          showStatus(`Done! ${res.analysis.insertedCount} inserted, ${res.analysis.updatedCount} updated.`, 'text-success');
        } else {
          showStatus(res.message || 'Transfer failed.', 'text-danger');
        }
      })
      .withFailureHandler((err) => {
        btn.disabled = false;
        btn.innerHTML = 'Confirm Transfer';
        showStatus(err.message || 'Script error.', 'text-danger');
      })
      .runTransferWorkflow(false);
  }

  function cancelTransfer() {
    el('transferReport').classList.add('d-none');
    el('btnCommit').classList.remove('d-none');
  }

  // Initialise transfer tab state on load
  initTransferTab();
</script>
